<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stan Okafor — HR Practitioner & People Systems Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1C2128;
    --paper: #F6F2EB;
    --paper-raised: #FBF8F3;
    --ochre: #D29A4E;
    --ochre-deep: #B27A2E;
    --sage: #8A9B8E;
    --line: #DDD6C9;
    --muted: #6E6B63;
    --serif: 'Fraunces', serif;
    --sans: 'Inter', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 32px; }

  /* NAV */
  header { position: sticky; top: 0; z-index: 50; background: rgba(246, 242, 235, 0.92); backdrop-filter: blur(6px); border-bottom: 1px solid var(--line); }
  nav.wrap { display: flex; align-items: center; justify-content: space-between; height: 72px; }
  .logo { font-family: var(--serif); font-weight: 600; font-size: 22px; letter-spacing: 0.02em; }
  .logo span { color: var(--ochre-deep); }
  .nav-links { display: flex; gap: 32px; font-family: var(--mono); font-size: 13px; letter-spacing: 0.03em; }
  .nav-links a { position: relative; padding-bottom: 4px; transition: color 0.2s; }
  .nav-links a:hover { color: var(--ochre-deep); }
  .nav-links a::after { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 1px; background: var(--ochre); transition: width 0.25s ease; }
  .nav-links a:hover::after { width: 100%; }
  .nav-toggle { display: none; }

  /* HERO */
  .hero { padding: 96px 0 64px; border-bottom: 1px solid var(--line); }
  .hero-eyebrow { font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ochre-deep); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .hero-eyebrow::before { content: ''; display: inline-block; width: 28px; height: 1px; background: var(--ochre); }
  h1.hero-title { font-family: var(--serif); font-weight: 600; font-size: clamp(40px, 7vw, 72px); line-height: 1.08; letter-spacing: -0.01em; max-width: 14ch; }
  .hero-title em { font-style: italic; color: var(--ochre-deep); }
  .hero-sub { margin-top: 24px; font-size: 18px; color: var(--muted); max-width: 46ch; }
  .hero-actions { margin-top: 36px; display: flex; gap: 16px; flex-wrap: wrap; }
  .btn { font-family: var(--mono); font-size: 13px; letter-spacing: 0.03em; padding: 13px 24px; border: 1px solid var(--ink); border-radius: 2px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--ochre-deep); border-color: var(--ochre-deep); }
  .btn-ghost:hover { background: var(--ink); color: var(--paper); }

  /* REGISTER STRIP */
  .register { border-bottom: 1px solid var(--line); overflow-x: auto; background: var(--paper-raised); }
  .register-track { display: flex; min-width: max-content; }
  .register-entry { flex: 0 0 auto; width: 270px; padding: 28px 28px 24px; border-right: 1px solid var(--line); position: relative; }
  .register-entry:last-child { border-right: none; }
  .register-no { font-family: var(--mono); font-size: 12px; color: var(--sage); letter-spacing: 0.08em; }
  .register-year { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .register-title { font-family: var(--serif); font-size: 19px; font-weight: 500; margin-bottom: 8px; }
  .register-desc { font-size: 13.5px; color: var(--muted); line-height: 1.55; }
  .register-entry::after { content: '→'; position: absolute; right: -13px; top: 28px; color: var(--ochre); font-size: 14px; z-index: 2; background: var(--paper-raised); width: 24px; text-align: center; }
  .register-entry:last-child::after { content: ''; }

  /* SECTION GENERIC */
  section { padding: 88px 0; }
  section + section { border-top: 1px solid var(--line); }
  .section-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 16px; margin-bottom: 48px; }
  .section-no { font-family: var(--mono); font-size: 13px; color: var(--sage); letter-spacing: 0.1em; }
  h2.section-title { font-family: var(--serif); font-weight: 600; font-size: clamp(28px, 4vw, 40px); letter-spacing: -0.01em; }
  .section-note { font-size: 14px; color: var(--muted); max-width: 38ch; text-align: right; }

  /* ABOUT */
  .about-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 64px; }
  .about-text p { margin-bottom: 20px; font-size: 16.5px; color: #2D333B; max-width: 56ch; }
  .about-text p:last-child { margin-bottom: 0; }
  .quote-block { font-family: var(--serif); font-style: italic; font-size: 20px; line-height: 1.5; border-left: 2px solid var(--ochre); padding-left: 24px; margin: 28px 0; color: #3A3F33; }
  .facts { border: 1px solid var(--line); background: var(--paper-raised); padding: 28px; align-self: start; }
  .facts-title { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); margin-bottom: 20px; }
  .fact-row { display: flex; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .fact-row:last-child { border-bottom: none; padding-bottom: 0; }
  .fact-label { color: var(--muted); }
  .fact-value { font-family: var(--mono); font-size: 13px; text-align: right; }

  /* WORK */
  .work-item { display: grid; grid-template-columns: 200px 1fr; gap: 32px; padding: 32px 0; border-bottom: 1px solid var(--line); }
  .work-item:first-of-type { padding-top: 0; }
  .work-item:last-child { border-bottom: none; padding-bottom: 0; }
  .work-period { font-family: var(--mono); font-size: 13px; color: var(--ochre-deep); }
  .work-role { font-family: var(--serif); font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .work-org { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
  .work-desc { font-size: 15px; max-width: 60ch; color: #2D333B; }
  .work-desc ul { margin-top: 10px; padding-left: 20px; }
  .work-desc li { margin-bottom: 6px; }

  /* PROJECTS */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
  .filter-btn { font-family: var(--mono); font-size: 12.5px; padding: 9px 18px; border: 1px solid var(--line); background: transparent; color: var(--muted); cursor: pointer; border-radius: 2px; transition: all 0.18s ease; }
  .filter-btn:hover { border-color: var(--ochre); color: var(--ink); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
  .project-card { border: 1px solid var(--line); background: var(--paper-raised); padding: 28px; display: flex; flex-direction: column; transition: border-color 0.2s ease, transform 0.2s ease; }
  .project-card:hover { border-color: var(--ochre); transform: translateY(-3px); }
  .project-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ochre-deep); margin-bottom: 14px; }
  .project-title { font-family: var(--serif); font-size: 20px; font-weight: 500; margin-bottom: 10px; }
  .project-desc { font-size: 14px; color: var(--muted); flex-grow: 1; margin-bottom: 18px; }
  .project-stack { font-family: var(--mono); font-size: 11px; color: var(--sage); border-top: 1px solid var(--line); padding-top: 14px; }
  .project-card[hidden] { display: none; }

  /* WRITING */
  .writing-list { display: flex; flex-direction: column; }
  .writing-item { display: grid; grid-template-columns: 130px 1fr auto; gap: 24px; align-items: baseline; padding: 22px 0; border-bottom: 1px solid var(--line); transition: padding-left 0.2s ease; }
  .writing-item:last-child { border-bottom: none; }
  .writing-item:hover { padding-left: 8px; }
  .writing-date { font-family: var(--mono); font-size: 12.5px; color: var(--sage); }
  .writing-title { font-family: var(--serif); font-size: 18px; font-weight: 500; }
  .writing-title:hover { color: var(--ochre-deep); }
  .writing-arrow { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .writing-excerpt { grid-column: 2 / 3; font-size: 13.5px; color: var(--muted); margin-top: 4px; max-width: 56ch; }

  /* CONTACT */
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
  .contact-title { font-family: var(--serif); font-weight: 600; font-size: clamp(32px, 5vw, 52px); line-height: 1.15; margin-bottom: 24px; }
  .contact-text { color: var(--muted); max-width: 44ch; margin-bottom: 32px; }
  .contact-links { display: flex; flex-direction: column; border: 1px solid var(--line); }
  .contact-link { display: flex; justify-content: space-between; align-items: center; padding: 22px 28px; border-bottom: 1px solid var(--line); transition: background 0.2s ease; }
  .contact-link:last-child { border-bottom: none; }
  .contact-link:hover { background: var(--paper-raised); }
  .contact-link-label { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--sage); }
  .contact-link-value { font-size: 15px; }
  .contact-link-arrow { font-family: var(--mono); font-size: 14px; color: var(--ochre-deep); }

  /* FOOTER */
  footer { padding: 32px 0; font-family: var(--mono); font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

  /* RESPONSIVE */
  @media (max-width: 860px) {
    .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 40px; }
    .work-item { grid-template-columns: 1fr; gap: 8px; }
    .writing-item { grid-template-columns: 1fr; gap: 6px; }
    .writing-excerpt { grid-column: 1; }
    .writing-arrow { display: none; }
  }
  @media (max-width: 640px) {
    .wrap { padding: 0 20px; }
    .nav-links { display: none; }
    .nav-toggle { display: block; font-family: var(--mono); font-size: 13px; background: none; border: 1px solid var(--ink); padding: 8px 14px; cursor: pointer; }
    .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 72px; left: 0; right: 0; background: var(--paper); border-bottom: 1px solid var(--line); padding: 20px 20px; gap: 18px; z-index: 100; }
    .hero { padding: 64px 0 40px; }
    section { padding: 56px 0; }
    .section-note { text-align: left; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; scroll-behavior: auto !important; } }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--ochre-deep); outline-offset: 2px; }
</style>
</head>
<body>

<header>
  <nav class="wrap">
    <div class="logo" id="logo"></div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">menu</button>
    <div class="nav-links" id="navLinks">
      <a href="#about">about</a>
      <a href="#work">work</a>
      <a href="#projects">projects</a>
      <a href="#writing">writing</a>
      <a href="#contact">contact</a>
    </div>
  </nav>
</header>

<section class="hero">
  <div class="wrap">
    <div class="hero-eyebrow" id="heroEyebrow"></div>
    <h1 class="hero-title" id="heroTitle"></h1>
    <p class="hero-sub" id="heroSub"></p>
    <div class="hero-actions" id="heroActions"></div>
  </div>
</section>

<div class="register">
  <div class="wrap" style="padding: 0;">
    <div class="register-track" id="registerTrack"></div>
  </div>
</div>

<section id="about">
  <div class="wrap">
    <div class="section-head">
      <div>
        <div class="section-no" id="aboutLabel"></div>
        <h2 class="section-title" id="aboutTitle"></h2>
      </div>
      <p class="section-note" id="aboutNote"></p>
    </div>
    <div class="about-grid">
      <div class="about-text" id="aboutText"></div>
      <div class="facts" id="aboutFacts"></div>
    </div>
  </div>
</section>

<section id="work">
  <div class="wrap">
    <div class="section-head">
      <div>
        <div class="section-no" id="workLabel"></div>
        <h2 class="section-title" id="workTitle"></h2>
      </div>
      <p class="section-note" id="workNote"></p>
    </div>
    <div id="workItems"></div>
  </div>
</section>

<section id="projects">
  <div class="wrap">
    <div class="section-head">
      <div>
        <div class="section-no" id="projectsLabel"></div>
        <h2 class="section-title" id="projectsTitle"></h2>
      </div>
      <p class="section-note" id="projectsNote"></p>
    </div>
    <div class="filters" id="filters"></div>
    <div class="project-grid" id="projectGrid"></div>
  </div>
</section>

<section id="writing">
  <div class="wrap">
    <div class="section-head">
      <div>
        <div class="section-no" id="writingLabel"></div>
        <h2 class="section-title" id="writingTitle"></h2>
      </div>
      <p class="section-note" id="writingNote"></p>
    </div>
    <div class="writing-list" id="writingList"></div>
  </div>
</section>

<section id="contact">
  <div class="wrap">
    <div class="contact-grid">
      <div>
        <h2 class="contact-title" id="contactTitle"></h2>
        <p class="contact-text" id="contactText"></p>
      </div>
      <div class="contact-links" id="contactLinks"></div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; width:100%;">
    <div id="footerLeft"></div>
    <div id="footerRight"></div>
  </div>
</footer>

<script>
fetch('content.json')
  .then(res => res.json())
  .then(c => renderSite(c));

function renderSite(c) {
  document.getElementById('logo').innerHTML = `${c.brand.name}<span>.</span>${c.brand.surname}`;

  document.getElementById('heroEyebrow').textContent = c.hero.eyebrow;
  document.getElementById('heroTitle').innerHTML = `${c.hero.titleStart}<em>${c.hero.titleEmphasis}</em>${c.hero.titleEnd}`;
  document.getElementById('heroSub').textContent = c.hero.subtitle;
  document.getElementById('heroActions').innerHTML = `
    <a href="${c.hero.primaryButtonLink}" class="btn btn-primary">${c.hero.primaryButtonText}</a>
    <a href="${c.hero.secondaryButtonLink}" class="btn btn-ghost">${c.hero.secondaryButtonText}</a>
  `;

  document.getElementById('registerTrack').innerHTML = c.register.map(r => `
    <div class="register-entry">
      <div class="register-no">${r.no}</div>
      <div class="register-year">${r.year}</div>
      <div class="register-title">${r.title}</div>
      <div class="register-desc">${r.desc}</div>
    </div>
  `).join('');

  document.getElementById('aboutLabel').textContent = c.about.sectionLabel;
  document.getElementById('aboutTitle').textContent = c.about.title;
  document.getElementById('aboutNote').textContent = c.about.note;

  const aboutParas = c.about.paragraphs.map((p, i) => {
    if (i === 1) return `<div class="quote-block">${c.about.quote}</div><p>${p}</p>`;
    return `<p>${p}</p>`;
  }).join('');
  document.getElementById('aboutText').innerHTML = aboutParas;

  document.getElementById('aboutFacts').innerHTML = `
    <div class="facts-title">At a glance</div>
    ${c.about.facts.map(f => `
      <div class="fact-row">
        <span class="fact-label">${f.label}</span>
        <span class="fact-value">${f.value}</span>
      </div>
    `).join('')}
  `;

  document.getElementById('workLabel').textContent = c.work.sectionLabel;
  document.getElementById('workTitle').textContent = c.work.title;
  document.getElementById('workNote').textContent = c.work.note;

  document.getElementById('workItems').innerHTML = c.work.items.map(item => `
    <div class="work-item">
      <div class="work-period">${item.period}</div>
      <div>
        <div class="work-role">${item.role}</div>
        <div class="work-org">${item.org}</div>
        <div class="work-desc">
          ${item.description}
          ${item.bullets && item.bullets.length ? `<ul>${item.bullets.map(b => `<li>${b}</li>`).join('')}</ul>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('projectsLabel').textContent = c.projects.sectionLabel;
  document.getElementById('projectsTitle').textContent = c.projects.title;
  document.getElementById('projectsNote').textContent = c.projects.note;

  document.getElementById('filters').innerHTML = c.projects.filters.map((f, i) => `
    <button class="filter-btn${i === 0 ? ' active' : ''}" data-filter="${f.key}">${f.label}</button>
  `).join('');

  document.getElementById('projectGrid').innerHTML = c.projects.items.map(p => `
    <div class="project-card" data-category="${p.category}">
      <div class="project-tag">${p.tag}</div>
      <div class="project-title">${p.title}</div>
      <div class="project-desc">${p.description}</div>
      <div class="project-stack">${p.stack}</div>
    </div>
  `).join('');

  document.getElementById('writingLabel').textContent = c.writing.sectionLabel;
  document.getElementById('writingTitle').textContent = c.writing.title;
  document.getElementById('writingNote').textContent = c.writing.note;

  document.getElementById('writingList').innerHTML = c.writing.items.map(item => `
    <div class="writing-item">
      <div class="writing-date">${item.date}</div>
      <div>
        <a href="${item.link}" class="writing-title">${item.title}</a>
        <div class="writing-excerpt">${item.excerpt}</div>
      </div>
      <div class="writing-arrow">read →</div>
    </div>
  `).join('');

  document.getElementById('contactTitle').textContent = c.contact.title;
  document.getElementById('contactText').textContent = c.contact.text;
  document.getElementById('contactLinks').innerHTML = c.contact.links.map(l => `
    <a href="${l.href}" class="contact-link">
      <span class="contact-link-label">${l.label}</span>
      <span class="contact-link-value">${l.value}</span>
      <span class="contact-link-arrow">${l.arrow}</span>
    </a>
  `).join('');

  document.getElementById('footerLeft').textContent = c.footer.left;
  document.getElementById('footerRight').textContent = c.footer.right;

  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      document.querySelectorAll('.project-card').forEach(card => {
        card.hidden = !(filter === 'all' || card.dataset.category === filter);
      });
    });
  });
} // end renderSite

// nav toggle works immediately, doesn't depend on fetched content
const navToggle = document.getElementById('navToggle');
const navLinks = document.getElementById('navLinks');
navToggle.addEventListener('click', () => {
  const open = navLinks.classList.toggle('open');
  navToggle.setAttribute('aria-expanded', open);
});
navLinks.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => {
    navLinks.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  });
});
</script>

</body>
</html>
